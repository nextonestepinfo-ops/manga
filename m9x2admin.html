<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理画面 - MangaHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #000; color: #fff; }
    #app { width: 100%; min-height: 100vh; background: #000; }
    button, input, textarea, select { font-family: inherit; outline: none; }
    
    .btn { background: #e63946; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: #333; }
    .btn-small { padding: 8px 14px; font-size: 12px; }
    .btn-outline { background: transparent; border: 1px solid #333; color: #fff; }
    .btn-danger { background: #dc2626; }
    
    /* Login */
    .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #111; border: 1px solid #222; border-radius: 16px; padding: 40px 32px; width: 90%; max-width: 400px; }
    .login-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 28px; }
    .login-field { margin-bottom: 18px; }
    .login-label { font-size: 12px; opacity: 0.6; display: block; margin-bottom: 8px; }
    .login-input { width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; padding: 14px; color: #fff; font-size: 15px; }
    .login-input:focus { border-color: #e63946; }
    .login-btn { width: 100%; background: #e63946; color: #fff; border: none; padding: 16px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .login-error { color: #e63946; font-size: 13px; text-align: center; margin-top: 14px; }
    
    /* Admin - PC Full Width */
    .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
    .admin-logo { display: flex; align-items: center; gap: 12px; }
    .admin-logo-icon { width: 40px; height: 40px; background: #e63946; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .admin-logo-text { font-size: 18px; font-weight: 700; }
    .admin-logout { background: #333; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .admin-logout:hover { background: #444; }
    
    .admin-tabs { display: flex; border-bottom: 1px solid #222; background: #111; padding: 0 32px; }
    .admin-tab { padding: 16px 40px; background: transparent; border: none; color: #fff; opacity: 0.6; font-size: 15px; cursor: pointer; text-align: center; }
    .admin-tab.active { color: #e63946; opacity: 1; font-weight: 600; border-bottom: 3px solid #e63946; }
    .admin-tab:hover { opacity: 0.8; }
    
    .admin-section { padding: 32px; max-width: 1600px; margin: 0 auto; }
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 32px; }
    .admin-group { margin-bottom: 28px; }
    .admin-group-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .admin-group-title span { color: #e63946; }
    .admin-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
    .admin-field { margin-bottom: 14px; }
    .admin-label { font-size: 12px; opacity: 0.5; display: block; margin-bottom: 8px; }
    .admin-input { width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; padding: 14px; color: #fff; font-size: 14px; }
    .admin-input:focus { border-color: #e63946; }
    .admin-textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; padding: 14px; color: #fff; font-size: 13px; resize: vertical; min-height: 100px; line-height: 1.6; }
    .admin-select { width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; padding: 14px; color: #fff; font-size: 14px; }
    .admin-save { width: 100%; background: #e63946; color: #fff; border: none; padding: 16px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px; }
    .admin-save:hover { background: #d62839; }
    
    /* X Editor - PC */
    .x-subtabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .x-subtab { background: #222; border: none; color: #fff; opacity: 0.6; padding: 12px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .x-subtab.active { background: #e63946; opacity: 1; }
    .x-subtab:hover { opacity: 0.8; }
    
    .account-item { display: flex; align-items: center; gap: 14px; padding: 14px; background: #000; border: 1px solid #333; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
    .account-item.active { border-color: #e63946; }
    .account-avatar { width: 44px; height: 44px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .account-info { flex: 1; }
    .account-name { font-size: 14px; font-weight: 600; }
    .account-handle { font-size: 12px; opacity: 0.5; }
    .account-type { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #333; }
    .account-type.main { background: #e63946; }
    .account-type.sub { background: #1d4ed8; }
    
    .tree-post { background: #000; border: 1px solid #333; border-radius: 10px; margin-bottom: 12px; }
    .tree-post-header { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid #222; }
    .tree-post-num { width: 28px; height: 28px; background: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .tree-post-type { font-size: 12px; opacity: 0.6; }
    .tree-post-body { padding: 14px; }
    .tree-post-images { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .tree-post-img { width: 70px; height: 70px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border: 2px dashed #444; }
    
    .template-item { background: #000; border: 1px solid #333; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .template-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .template-preview { font-size: 12px; opacity: 0.6; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .template-meta { display: flex; gap: 10px; margin-top: 12px; }
    
    .history-item { background: #000; border: 1px solid #333; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-date { font-size: 12px; opacity: 0.5; }
    .history-status { font-size: 11px; padding: 4px 10px; border-radius: 6px; }
    .history-status.sent { background: #22c55e; }
    .history-status.scheduled { background: #f59e0b; }
    .history-content { font-size: 13px; line-height: 1.6; opacity: 0.8; }
    
    .schedule-item { display: flex; align-items: center; gap: 16px; padding: 16px; background: #000; border: 1px solid #333; border-radius: 10px; margin-bottom: 12px; }
    .schedule-time { font-size: 13px; font-weight: 600; min-width: 100px; }
    .schedule-content { flex: 1; font-size: 12px; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .image-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    .image-item { aspect-ratio: 1; background: #1a1a1a; border-radius: 10px; position: relative; cursor: pointer; overflow: hidden; border: 3px solid transparent; }
    .image-item.selected { border-color: #e63946; }
    .image-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .image-item-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); color: #888; font-size: 11px; text-align: center; padding: 8px; }
    .image-item-order { position: absolute; top: 8px; left: 8px; width: 28px; height: 28px; background: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .image-item-name { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 6px 8px; font-size: 10px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    
    .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #fff; padding: 16px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 1000; display: none; }
    .toast.show { display: block; animation: fadeInOut 2s ease; }
    @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  
  <script>
    // 認証情報
    const ADMIN_ID = 'admin';
    const ADMIN_PASS = 'manga2026';
    
    // LocalStorageキー
    const STORAGE_KEYS = {
      siteSettings: 'mangahub_site',
      mangaList: 'mangahub_manga',
      tags: 'mangahub_tags',
      badges: 'mangahub_badges',
      xAccounts: 'mangahub_x_accounts',
      xTemplates: 'mangahub_x_templates',
      xHistory: 'mangahub_x_history',
      xSchedule: 'mangahub_x_schedule',
      xImages: 'mangahub_x_images',
      imageFolders: 'mangahub_image_folders'
    };
    
    // データ
    let siteSettings = { siteName: 'MangaHub', mainTitle: '気になる漫画を試し読み', badge: '🔥 今週の注目' };
    
    // タグ・バッジマスター
    let tagsMaster = [
      { id: 1, name: 'ラブコメ', color: '#ec4899' },
      { id: 2, name: 'ファンタジー', color: '#8b5cf6' },
      { id: 3, name: '学園', color: '#3b82f6' },
      { id: 4, name: '大人向け', color: '#f59e0b' },
      { id: 5, name: '癒し系', color: '#10b981' },
      { id: 6, name: 'ダーク', color: '#6b7280' },
    ];
    
    let badgesMaster = [
      { id: 1, name: 'NEW', color: '#22c55e' },
      { id: 2, name: '人気', color: '#e63946' },
      { id: 3, name: '急上昇', color: '#f59e0b' },
      { id: 4, name: '完結', color: '#6b7280' },
      { id: 5, name: '限定', color: '#8b5cf6' },
      { id: 6, name: 'おすすめ', color: '#3b82f6' },
    ];
    
    let mangaList = [
      { id: 1, title: '甘々同棲ライフ', genre: '甘々いちゃラブ', rating: 4.8, badge: 'NEW', tags: [1, 5], pages: 6, description: '一途で素直な彼女との甘い同棲生活。', type: 'A', imageFolder: null },
      { id: 2, title: '年上彼女の誘惑', genre: '大人の余裕系', rating: 4.7, badge: '人気', tags: [1, 4], pages: 8, description: '包容力抜群のお姉さん上司との恋愛。', type: 'B', imageFolder: null },
      { id: 3, title: 'メイドカフェ物語', genre: 'コスチューム系', rating: 4.6, badge: null, tags: [1, 3], pages: 5, description: 'メイド服が眩しい！', type: 'C', imageFolder: null },
      { id: 4, title: 'エルフと異世界生活', genre: 'ファンタジー', rating: 4.9, badge: '人気', tags: [2, 5], pages: 7, description: '異世界ファンタジー', type: 'D', imageFolder: null },
      { id: 5, title: 'ドタバタ学園コメディ', genre: 'ラブコメ', rating: 4.5, badge: null, tags: [1, 3], pages: 4, description: 'テンポ抜群のラブコメ', type: 'E', imageFolder: null },
      { id: 6, title: '小悪魔彼女の罠', genre: '小悪魔系', rating: 4.7, badge: null, tags: [1, 4], pages: 6, description: '駆け引きラブ', type: 'F', imageFolder: null },
    ];
    
    let xAccounts = [
      { id: 1, name: 'メインアカウント', handle: '@manga_main', type: 'main', apiKey: '', apiSecret: '', accessToken: '', accessSecret: '' },
      { id: 2, name: 'サブアカウント1', handle: '@manga_sub1', type: 'sub', apiKey: '', apiSecret: '', accessToken: '', accessSecret: '' },
    ];
    
    let xTemplates = [
      { id: 1, name: '新作紹介テンプレ', content: '📚 新作のご紹介！\n\n{{title}}\n\n#漫画 #試し読み', createdAt: '2026-04-01' },
    ];
    
    let xHistory = [];
    let xSchedule = [];
    let xImages = [];
    let imageFolders = {}; // { folderName: [{ name, dataUrl }] }
    
    let currentTreePosts = [{ id: 1, type: 'tweet', content: '', images: [], imageCount: 4 }];
    let selectedImages = [];
    let editingManga = null; // 編集中の作品
    
    // State
    let isLoggedIn = false;
    let showLoginError = false;
    let adminTab = 'site';
    let xSubTab = 'accounts';
    let selectedAccountId = 1;

    // Load/Save
    function loadData() {
      try {
        const site = localStorage.getItem(STORAGE_KEYS.siteSettings);
        if (site) siteSettings = JSON.parse(site);
        const manga = localStorage.getItem(STORAGE_KEYS.mangaList);
        if (manga) mangaList = JSON.parse(manga);
        const tags = localStorage.getItem(STORAGE_KEYS.tags);
        if (tags) tagsMaster = JSON.parse(tags);
        const badges = localStorage.getItem(STORAGE_KEYS.badges);
        if (badges) badgesMaster = JSON.parse(badges);
        const accounts = localStorage.getItem(STORAGE_KEYS.xAccounts);
        if (accounts) xAccounts = JSON.parse(accounts);
        const templates = localStorage.getItem(STORAGE_KEYS.xTemplates);
        if (templates) xTemplates = JSON.parse(templates);
        const history = localStorage.getItem(STORAGE_KEYS.xHistory);
        if (history) xHistory = JSON.parse(history);
        const schedule = localStorage.getItem(STORAGE_KEYS.xSchedule);
        if (schedule) xSchedule = JSON.parse(schedule);
        const images = localStorage.getItem(STORAGE_KEYS.xImages);
        if (images) xImages = JSON.parse(images);
        const folders = localStorage.getItem(STORAGE_KEYS.imageFolders);
        if (folders) imageFolders = JSON.parse(folders);
      } catch (e) { console.error('Load error:', e); }
    }

    function saveData(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify(data));
        showToast('保存しました');
      } catch (e) { showToast('保存に失敗しました'); }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = isLoggedIn ? renderAdmin() : renderLogin();
    }

    function renderLogin() {
      return `
        <div class="login-overlay">
          <div class="login-box">
            <h2 class="login-title">🔐 管理者ログイン</h2>
            <div class="login-field">
              <label class="login-label">ユーザーID</label>
              <input type="text" id="loginId" class="login-input" placeholder="ID を入力">
            </div>
            <div class="login-field">
              <label class="login-label">パスワード</label>
              <input type="password" id="loginPass" class="login-input" placeholder="パスワードを入力">
            </div>
            <button class="login-btn" onclick="tryLogin()">ログイン</button>
            ${showLoginError ? '<p class="login-error">ID またはパスワードが違います</p>' : ''}
          </div>
        </div>`;
    }

    function renderAdmin() {
      return `
        <header class="admin-header">
          <div class="admin-logo">
            <div class="admin-logo-icon">⚙️</div>
            <span class="admin-logo-text">管理画面</span>
          </div>
          <div style="display:flex;gap:8px">
            <a href="index.html" class="btn btn-small">サイトを見る</a>
            <button class="admin-logout" onclick="logout()">ログアウト</button>
          </div>
        </header>
        
        <div class="admin-tabs">
          <button class="admin-tab ${adminTab==='site'?'active':''}" onclick="setAdminTab('site')">サイト</button>
          <button class="admin-tab ${adminTab==='works'?'active':''}" onclick="setAdminTab('works')">作品</button>
          <button class="admin-tab ${adminTab==='x'?'active':''}" onclick="setAdminTab('x')">X運用</button>
        </div>
        
        <section class="admin-section">
          ${adminTab==='site' ? renderAdminSite() : ''}
          ${adminTab==='works' ? renderAdminWorks() : ''}
          ${adminTab==='x' ? renderAdminX() : ''}
        </section>`;
    }

    function renderAdminSite() {
      return `
        <div class="admin-group">
          <h3 class="admin-group-title"><span>●</span> サイト基本情報</h3>
          <div class="admin-card">
            <div class="admin-field">
              <label class="admin-label">サイト名</label>
              <input type="text" id="siteName" class="admin-input" value="${siteSettings.siteName}">
            </div>
            <div class="admin-field">
              <label class="admin-label">バッジテキスト</label>
              <input type="text" id="siteBadge" class="admin-input" value="${siteSettings.badge}">
            </div>
            <div class="admin-field">
              <label class="admin-label">メインタイトル</label>
              <input type="text" id="siteTitle" class="admin-input" value="${siteSettings.mainTitle}">
            </div>
          </div>
        </div>
        <button class="admin-save" onclick="saveSiteSettings()">変更を保存</button>`;
    }

    let worksSubTab = 'list'; // list, tags, badges
    
    function renderAdminWorks() {
      return `
        <div class="x-subtabs" style="margin-bottom:20px">
          <button class="x-subtab ${worksSubTab==='list'?'active':''}" onclick="setWorksSubTab('list')">作品一覧</button>
          <button class="x-subtab ${worksSubTab==='tags'?'active':''}" onclick="setWorksSubTab('tags')">タグ管理</button>
          <button class="x-subtab ${worksSubTab==='badges'?'active':''}" onclick="setWorksSubTab('badges')">バッジ管理</button>
        </div>
        ${worksSubTab === 'list' ? renderWorksList() : ''}
        ${worksSubTab === 'tags' ? renderTagsManager() : ''}
        ${worksSubTab === 'badges' ? renderBadgesManager() : ''}
        ${editingManga ? renderEditModal() : ''}`;
    }
    
    function setWorksSubTab(tab) {
      worksSubTab = tab;
      render();
    }
    
    function renderWorksList() {
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:14px;opacity:0.6">全 ${mangaList.length} 作品</div>
          <button class="btn" onclick="addNewManga()">+ 新規作品を追加</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(400px, 1fr));gap:16px">
        ${mangaList.map((m, idx) => {
          const folderImages = m.imageFolder && imageFolders[m.imageFolder] ? imageFolders[m.imageFolder] : [];
          const thumbUrl = folderImages.length > 0 ? folderImages[0].dataUrl : null;
          return `
          <div class="admin-card" style="position:relative">
            <div style="position:absolute;top:-8px;left:-8px;width:32px;height:32px;background:#e63946;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">${idx + 1}</div>
            <div style="display:flex;gap:14px">
              <div style="width:70px;height:90px;background:#333;border-radius:8px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center">
                ${thumbUrl ? `<img src="${thumbUrl}" style="width:100%;height:100%;object-fit:cover">` : `<span style="font-size:11px;opacity:0.5">No.${idx + 1}</span>`}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:15px;font-weight:700;margin-bottom:6px">${m.title}</div>
                <div style="font-size:12px;opacity:0.6;margin-bottom:4px">${m.genre} | タイプ: ${m.type} | ★${m.rating}</div>
                <div style="font-size:11px;opacity:0.4;margin-bottom:8px">
                  ID: ${m.id} | URL: <span style="color:#e63946;cursor:pointer" onclick="window.open('index.html?id=${m.id}','_blank')">?id=${m.id}</span>
                  ${m.imageFolder ? ` | 📁 ${m.imageFolder} (${folderImages.length}枚)` : ' | 📁 未設定'}
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
                  ${m.badge ? `<span style="background:${getBadgeColor(m.badge)};padding:4px 10px;border-radius:6px;font-size:11px">${m.badge}</span>` : ''}
                  ${(m.tags || []).map(tagId => {
                    const tag = tagsMaster.find(t => t.id === tagId);
                    return tag ? `<span style="background:${tag.color};padding:4px 10px;border-radius:6px;font-size:11px">${tag.name}</span>` : '';
                  }).join('')}
                </div>
                <div style="display:flex;gap:8px">
                  <button class="btn btn-small" onclick="openEditManga(${m.id})">編集</button>
                  <button class="btn btn-small btn-outline" onclick="deleteManga(${m.id})">削除</button>
                </div>
              </div>
            </div>
          </div>
        `}).join('')}
        </div>`;
    }
    
    function getBadgeColor(badgeName) {
      const badge = badgesMaster.find(b => b.name === badgeName);
      return badge ? badge.color : '#e63946';
    }
    
    function renderTagsManager() {
      return `
        <div class="admin-group">
          <h3 class="admin-group-title"><span>🏷️</span> タグ管理</h3>
          <div class="admin-card">
            <div style="display:flex;gap:10px;margin-bottom:16px">
              <input type="text" id="newTagName" class="admin-input" style="flex:1" placeholder="タグ名">
              <input type="color" id="newTagColor" value="#ec4899" style="width:50px;height:42px;border:none;border-radius:8px;cursor:pointer">
              <button class="btn" onclick="addTag()">追加</button>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:10px">
              ${tagsMaster.map(tag => `
                <div style="display:flex;align-items:center;gap:8px;background:#111;border:1px solid #333;padding:8px 12px;border-radius:8px">
                  <span style="width:16px;height:16px;background:${tag.color};border-radius:4px"></span>
                  <span style="font-size:13px">${tag.name}</span>

    function selectImageFolder(folderName) {

    // タグ・バッジ管理関数
    function addTag() {
      const name = document.getElementById('newTagName').value.trim();
      const color = document.getElementById('newTagColor').value;
      if (!name) { showToast('タグ名を入力してください'); return; }
      const newId = tagsMaster.length > 0 ? Math.max(...tagsMaster.map(t => t.id)) + 1 : 1;
      tagsMaster.push({ id: newId, name, color });
      localStorage.setItem(STORAGE_KEYS.tags, JSON.stringify(tagsMaster));
      showToast('タグを追加しました');
      render();
    }
    
    function deleteTag(id) {
      if (!confirm('このタグを削除しますか？')) return;
      tagsMaster = tagsMaster.filter(t => t.id !== id);
      // 作品からも削除
      mangaList.forEach(m => {
        if (m.tags) m.tags = m.tags.filter(tid => tid !== id);
      });
      localStorage.setItem(STORAGE_KEYS.tags, JSON.stringify(tagsMaster));
      saveData(STORAGE_KEYS.mangaList, mangaList);
      render();
    }
    
    function addBadge() {
      const name = document.getElementById('newBadgeName').value.trim();
      const color = document.getElementById('newBadgeColor').value;
      if (!name) { showToast('バッジ名を入力してください'); return; }
      const newId = badgesMaster.length > 0 ? Math.max(...badgesMaster.map(b => b.id)) + 1 : 1;
      badgesMaster.push({ id: newId, name, color });
      localStorage.setItem(STORAGE_KEYS.badges, JSON.stringify(badgesMaster));
      showToast('バッジを追加しました');
      render();
    }
    
    function deleteBadge(id) {
      if (!confirm('このバッジを削除しますか？')) return;
      const badge = badgesMaster.find(b => b.id === id);
      badgesMaster = badgesMaster.filter(b => b.id !== id);
      // 作品からも削除
      if (badge) {
        mangaList.forEach(m => {
          if (m.badge === badge.name) m.badge = null;
        });
      }
      localStorage.setItem(STORAGE_KEYS.badges, JSON.stringify(badgesMaster));
      saveData(STORAGE_KEYS.mangaList, mangaList);
      render();
    }
    
    // 作品編集関数
    function openEditManga(id) {
      editingManga = JSON.parse(JSON.stringify(mangaList.find(m => m.id === id)));
      if (!editingManga.tags) editingManga.tags = [];
      render();
    }
    
    function closeEditModal() {
      editingManga = null;
      render();
    }
    
    function selectBadge(badgeName) {
      editingManga.badge = badgeName;
      render();
    }
    
    function toggleTag(tagId) {
      if (!editingManga.tags) editingManga.tags = [];
      const idx = editingManga.tags.indexOf(tagId);
      if (idx >= 0) editingManga.tags.splice(idx, 1);
      else editingManga.tags.push(tagId);
      render();
    }
    
    function saveEditManga() {
      const idx = mangaList.findIndex(m => m.id === editingManga.id);
      if (idx < 0) return;
      
      mangaList[idx] = {
        ...mangaList[idx],
        title: document.getElementById('editTitle').value.trim(),
        genre: document.getElementById('editGenre').value.trim(),
        type: document.getElementById('editType').value,
        rating: parseFloat(document.getElementById('editRating').value) || 4.5,
        pages: parseInt(document.getElementById('editPages').value) || 5,
        description: document.getElementById('editDesc').value.trim(),
        badge: editingManga.badge,
        tags: editingManga.tags,
        imageFolder: editingManga.imageFolder
      };
      
      saveData(STORAGE_KEYS.mangaList, mangaList);
      showToast('保存しました');
      editingManga = null;
      render();
    }

    // 手動HTMLから画像URL抽出
    async function extractFromHtml() {
      const html = document.getElementById('manualHtml').value;
      const folder = document.getElementById('manualFolder').value.trim() || 'manual_' + Date.now();
      
      if (!html || html.length < 100) {
        showToast('HTMLを入力してください');
        return;
      }
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      const imageUrls = [];
      doc.querySelectorAll('img').forEach(img => {
        const attrs = ['src', 'data-src', 'data-lazy-src', 'data-original'];
        for (const attr of attrs) {
          let src = img.getAttribute(attr);
          if (src && src.startsWith('http') && !src.includes('banner') && !src.includes('logo')) {
            imageUrls.push(src);
            break;
          }
        }
      });
      
      // aタグのhrefも確認（画像リンク）
      doc.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (href && /\.(jpg|jpeg|png|gif|webp)$/i.test(href)) {
          if (href.startsWith('http')) imageUrls.push(href);
        }
      });
      
      const uniqueUrls = [...new Set(imageUrls)];
      
      if (uniqueUrls.length === 0) {
        showToast('画像URLが見つかりません');
        return;
      }
      
      showToast(`${uniqueUrls.length}個のURLを検出`);
      
      // プロキシ経由でダウンロード
      const proxies = [
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
      ];
      
      const downloadedImages = [];
      
      for (let i = 0; i < uniqueUrls.length; i++) {
        const imgUrl = uniqueUrls[i];
        showToast(`ダウンロード中 ${i + 1}/${uniqueUrls.length}`);
        
        let blob = null;
        for (const makeProxy of proxies) {
          try {
            const response = await fetch(makeProxy(imgUrl));
            if (!response.ok) continue;
            const b = await response.blob();
            if (b.size >= 3000 && b.type.startsWith('image/')) {
              blob = b;
              break;
            }
          } catch (e) { continue; }
        }
        
        if (blob) {
          const dataUrl = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          });
          downloadedImages.push({
            name: `${folder}_${String(downloadedImages.length + 1).padStart(3, '0')}.jpg`,
            dataUrl
          });
        }
      }
      
      if (downloadedImages.length > 0) {
        imageFolders[folder] = downloadedImages;
        localStorage.setItem(STORAGE_KEYS.imageFolders, JSON.stringify(imageFolders));
        document.getElementById('folderList').innerHTML = renderFolderList();
        showToast(`${downloadedImages.length}枚を保存`);
        document.getElementById('manualHtml').value = '';
        document.getElementById('manualFolder').value = '';
      } else {
        showToast('ダウンロード失敗');
      }
    }
    
    function downloadFolderImages(folderName) {
      const images = imageFolders[folderName];
      if (!images || images.length === 0) {
        showToast('画像がありません');
        return;
      }
      
      // 1枚ずつダウンロード
      let downloaded = 0;
      
      function downloadNext() {
        if (downloaded >= images.length) {
          showToast(`${images.length}枚ダウンロード完了`);
          return;
        }
        
        const img = images[downloaded];
        const link = document.createElement('a');
        link.href = img.dataUrl;
        link.download = `${folderName}_${String(downloaded + 1).padStart(3, '0')}.jpg`;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        downloaded++;
        showToast(`ダウンロード中: ${downloaded}/${images.length}`);
        
        setTimeout(downloadNext, 500);
      }
      
      downloadNext();
    }

    // Scraper - URLごとにフォルダ保存
    async function scrapeImages() {
      const urlCards = document.querySelectorAll('#urlInputs .url-input-card');
      const validUrls = [];
      
      urlCards.forEach(card => {
        const urlInput = card.querySelector('.url-field');
        const folderInput = card.querySelector('.folder-field');
        if (urlInput && folderInput) {
          const url = urlInput.value.trim();
          const folder = folderInput.value.trim();
          if (url.startsWith('http')) {
            validUrls.push({ url, folder: folder || 'images_' + Date.now() });
          }
        }
      });
      
      if (validUrls.length === 0) { 
        showToast('URLを入力してください'); 
        return; 
      }
      
      const btn = document.getElementById('scrapeBtn');
      const progress = document.getElementById('scrapeProgress');
      
      btn.disabled = true;
      
      // 複数のプロキシを用意（順番に試行）
      const proxies = [
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
        u => `https://thingproxy.freeboard.io/fetch/${u}`,
        u => `https://cors-anywhere.herokuapp.com/${u}`,
      ];
      
      let totalDownloaded = 0;
      
      for (let urlIdx = 0; urlIdx < validUrls.length; urlIdx++) {
        const item = validUrls[urlIdx];
        const url = item.url;
        const folder = item.folder;
        
        progress.innerHTML = `
          <div class="admin-card" style="border-color:#e63946">
            <div style="font-size:12px;font-weight:600;margin-bottom:8px">📥 ${folder}</div>
            <div id="ptext" style="font-size:10px;opacity:0.7">ページ取得中...</div>
          </div>`;
        
        let imageUrls = [];
        let debugInfo = '';
        
        if (url.includes('dlsite.com')) {
          const rjMatch = url.match(/RJ(\d+)/i);
          if (rjMatch) {
            const rjNum = rjMatch[1];
            const rjId = 'RJ' + rjNum;
            const folderNum = Math.ceil(parseInt(rjNum) / 1000) * 1000;
            const folderId = 'RJ' + String(folderNum).padStart(rjNum.length, '0');
            let workType = 'doujin';
            if (url.includes('/pro/')) workType = 'professional';
            else if (url.includes('/girls/')) workType = 'girls';
            
            imageUrls.push(`https://img.dlsite.jp/modpub/images2/work/${workType}/${folderId}/${rjId}_img_main.jpg`);
            for (let i = 1; i <= 15; i++) {
              imageUrls.push(`https://img.dlsite.jp/modpub/images2/work/${workType}/${folderId}/${rjId}_img_smp${i}.jpg`);
            }
            debugInfo = `DLsite: ${rjId}, ${imageUrls.length}個のURL生成`;
          }
        } else {
          // 他サイト: HTMLを取得して画像URLを抽出
          let html = null;
          let usedProxy = '';
          
          for (const makeProxy of proxies) {
            try {
              const proxyUrl = makeProxy(url);
              const response = await fetch(proxyUrl);
              if (response.ok) {
                html = await response.text();
                usedProxy = proxyUrl.split('?')[0];
                break;
              }
            } catch (e) { 
              console.log('Proxy failed:', e);
              continue; 
            }
          }
          
          if (!html) {
            progress.innerHTML = `
              <div class="admin-card" style="border-color:#f59e0b">
                <p style="font-size:11px;color:#f59e0b">⚠️ ページ取得失敗</p>
                <p style="font-size:10px;opacity:0.6;margin-top:6px">プロキシがブロックされています</p>
                <p style="font-size:10px;opacity:0.6;margin-top:4px">→ 下の「手動HTML入力」を使ってください</p>
                <p style="font-size:9px;opacity:0.4;margin-top:8px">1. ページをChromeで開く<br>2. F12 → Elements → html右クリック → Copy outerHTML<br>3. 下のテキストエリアにペースト</p>
              </div>`;
            await new Promise(r => setTimeout(r, 3000));
            continue;
          }
          
          debugInfo = `HTML取得成功 (${html.length}文字) via ${usedProxy}`;
          document.getElementById('ptext').textContent = debugInfo;
          
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          
          // URLから数字を抽出
          const urlNumMatch = url.match(/\/(\d{3,})\/?/);
          const urlNumber = urlNumMatch ? urlNumMatch[1] : null;
          
          // 全imgタグから画像URLを収集
          const allImgs = [];
          doc.querySelectorAll('img').forEach(img => {
            const attrs = ['src', 'data-src', 'data-lazy-src', 'data-original', 'srcset'];
            for (const attr of attrs) {
              let src = img.getAttribute(attr);
              if (src) {
                if (src.includes(',')) src = src.split(',')[0].split(' ')[0]; // srcset対応
                if (src.startsWith('//')) src = 'https:' + src;
                else if (src.startsWith('/')) src = new URL(url).origin + src;
                if (src.startsWith('http')) {
                  allImgs.push(src);
                  break;
                }
              }
            }
          });
          
          debugInfo = `img要素: ${allImgs.length}個, URL数字: ${urlNumber || 'なし'}`;
          document.getElementById('ptext').textContent = debugInfo;
          await new Promise(r => setTimeout(r, 500));
          
          // フィルタリング
          if (urlNumber) {
            // URLの数字を含む画像のみ
            imageUrls = allImgs.filter(src => src.includes(urlNumber));
          }
          
          // それでも見つからない場合は広告以外の全画像
          if (imageUrls.length === 0) {
            const excludeWords = ['banner', 'ad', 'logo', 'icon', 'avatar', 'button', 'btn', 'sns', 'twitter', 'facebook'];
            imageUrls = allImgs.filter(src => {
              const lower = src.toLowerCase();
              return !excludeWords.some(w => lower.includes(w));
            });
          }
          
          debugInfo = `対象画像: ${imageUrls.length}個`;
          document.getElementById('ptext').textContent = debugInfo;
        }
        
        if (imageUrls.length === 0) {
          progress.innerHTML = `
            <div class="admin-card" style="border-color:#f59e0b">
              <p style="font-size:11px;color:#f59e0b">⚠️ 画像が見つかりません</p>
              <p style="font-size:10px;opacity:0.5;margin-top:4px">${debugInfo}</p>
            </div>`;
          await new Promise(r => setTimeout(r, 2000));
          continue;
        }
        
        // プログレスバー表示
        progress.innerHTML = `
          <div class="admin-card" style="border-color:#e63946">
            <div style="font-size:12px;font-weight:600;margin-bottom:8px">📥 ${folder}</div>
            <div style="background:#333;height:6px;border-radius:3px;margin:8px 0">
              <div id="pbar" style="background:#e63946;height:100%;width:0%;border-radius:3px"></div>
            </div>
            <div id="ptext" style="font-size:10px;opacity:0.7">${imageUrls.length}枚をダウンロード中...</div>
          </div>`;
        
        const downloadedImages = [];
        let consecutiveFails = 0;
        
        for (let i = 0; i < imageUrls.length; i++) {
          const imgUrl = imageUrls[i];
          
          const pct = Math.round(((i + 1) / imageUrls.length) * 100);
          const bar = document.getElementById('pbar');
          const text = document.getElementById('ptext');
          if (bar) bar.style.width = pct + '%';
          if (text) text.textContent = `${downloadedImages.length}枚取得 (${i + 1}/${imageUrls.length})`;
          
          let blob = null;
          for (const makeProxy of proxies) {
            try {
              const controller = new AbortController();
              const timeout = setTimeout(() => controller.abort(), 8000);
              const response = await fetch(makeProxy(imgUrl), { signal: controller.signal });
              clearTimeout(timeout);
              if (!response.ok) continue;
              const b = await response.blob();
              if (b.size >= 3000 && b.type.startsWith('image/')) {
                blob = b;
                break;
              }
            } catch (e) { continue; }
          }
          
          if (blob) {
            const dataUrl = await new Promise(resolve => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
            downloadedImages.push({
              name: `${folder}_${String(downloadedImages.length + 1).padStart(3, '0')}.jpg`,
              dataUrl
            });
            consecutiveFails = 0;
          } else {
            consecutiveFails++;
            if (consecutiveFails >= 3 && downloadedImages.length > 0) break;
          }
        }
        
        if (downloadedImages.length > 0) {
          imageFolders[folder] = downloadedImages;
          totalDownloaded += downloadedImages.length;
          localStorage.setItem(STORAGE_KEYS.imageFolders, JSON.stringify(imageFolders));
          
          const folderList = document.getElementById('folderList');
          if (folderList) folderList.innerHTML = renderFolderList();
          
          const pt = document.getElementById('ptext');
          if (pt) pt.textContent = `✅ ${downloadedImages.length}枚を保存`;
        } else {
          progress.innerHTML = `
            <div class="admin-card" style="border-color:#f59e0b">
              <p style="font-size:11px;color:#f59e0b">⚠️ ダウンロード失敗</p>
              <p style="font-size:10px;opacity:0.5;margin-top:4px">画像URL: ${imageUrls.length}個検出済み</p>
            </div>`;
        }
      }
      
      if (totalDownloaded > 0) {
        progress.innerHTML = `
          <div class="admin-card" style="border-color:#22c55e">
            <p style="font-size:12px;color:#22c55e">✅ 完了: ${totalDownloaded}枚</p>
          </div>`;
        showToast(`${totalDownloaded}枚保存`);
      }
      
      scrapeUrls = [{url:'', folder:''}];
      btn.disabled = false;
      btn.textContent = '🚀 一括取得';
    }
    
    // 未使用だが残す
    function loadImageAsDataUrl(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            canvas.getContext('2d').drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.9));
          } catch (e) { resolve(null); }
        };
        img.onerror = () => resolve(null);
        setTimeout(() => resolve(null), 5000);
        img.src = url;
      });
    }
    
    function copyUrls(urls) {
      navigator.clipboard.writeText(urls).then(() => showToast('URLをコピーしました'));
    }
    
    // フォルダの画像をライブラリに追加
    function loadFolderToLibrary(folderName) {
      if (!imageFolders[folderName]) return;
      showToast(`「${folderName}」を追加しました`);
      currentImageFolder = folderName;
      xSubTab = 'images';
      render();
    }
    
    // フォルダを削除
    function deleteFolder(folderName) {
      if (confirm(`「${folderName}」を削除しますか？`)) {
        delete imageFolders[folderName];
        if (currentImageFolder === folderName) currentImageFolder = null;
        localStorage.setItem(STORAGE_KEYS.imageFolders, JSON.stringify(imageFolders));
        showToast('フォルダを削除しました');
        render();
      }
    }

    // Init
    loadData();
    render();
  </script>
</body>
</html>
