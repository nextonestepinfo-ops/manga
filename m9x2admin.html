<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理画面 - MangaHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 390px; min-height: 100vh; background: #000; }
    button, input, textarea, select { font-family: inherit; outline: none; }
    
    .btn { background: #e63946; color: #fff; border: none; padding: 8px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: #333; }
    .btn-small { padding: 6px 10px; font-size: 10px; }
    .btn-outline { background: transparent; border: 1px solid #333; color: #fff; }
    .btn-danger { background: #dc2626; }
    
    /* Login */
    .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #111; border: 1px solid #222; border-radius: 16px; padding: 32px 24px; width: 90%; max-width: 320px; }
    .login-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 24px; }
    .login-field { margin-bottom: 16px; }
    .login-label { font-size: 11px; opacity: 0.6; display: block; margin-bottom: 6px; }
    .login-input { width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; }
    .login-input:focus { border-color: #e63946; }
    .login-btn { width: 100%; background: #e63946; color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .login-error { color: #e63946; font-size: 12px; text-align: center; margin-top: 12px; }
    
    /* Admin */
    .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
    .admin-logo { display: flex; align-items: center; gap: 8px; }
    .admin-logo-icon { width: 32px; height: 32px; background: #e63946; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .admin-logo-text { font-size: 14px; font-weight: 700; }
    .admin-logout { background: #333; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; }
    
    .admin-tabs { display: flex; border-bottom: 1px solid #222; background: #111; }
    .admin-tab { flex: 1; padding: 12px; background: transparent; border: none; color: #fff; opacity: 0.6; font-size: 11px; cursor: pointer; text-align: center; }
    .admin-tab.active { color: #e63946; opacity: 1; font-weight: 600; border-bottom: 2px solid #e63946; }
    
    .admin-section { padding: 16px; }
    .admin-group { margin-bottom: 20px; }
    .admin-group-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .admin-group-title span { color: #e63946; }
    .admin-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .admin-field { margin-bottom: 10px; }
    .admin-label { font-size: 10px; opacity: 0.5; display: block; margin-bottom: 4px; }
    .admin-input { width: 100%; background: #000; border: 1px solid #333; border-radius: 6px; padding: 10px; color: #fff; font-size: 12px; }
    .admin-input:focus { border-color: #e63946; }
    .admin-textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 6px; padding: 10px; color: #fff; font-size: 11px; resize: none; height: 80px; line-height: 1.5; }
    .admin-select { width: 100%; background: #000; border: 1px solid #333; border-radius: 6px; padding: 10px; color: #fff; font-size: 12px; }
    .admin-save { width: 100%; background: #e63946; color: #fff; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; }
    
    /* X Editor */
    .x-subtabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
    .x-subtab { background: #222; border: none; color: #fff; opacity: 0.6; padding: 8px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; }
    .x-subtab.active { background: #e63946; opacity: 1; }
    
    .account-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #000; border: 1px solid #333; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
    .account-item.active { border-color: #e63946; }
    .account-avatar { width: 36px; height: 36px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .account-info { flex: 1; }
    .account-name { font-size: 12px; font-weight: 600; }
    .account-handle { font-size: 10px; opacity: 0.5; }
    .account-type { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #333; }
    .account-type.main { background: #e63946; }
    .account-type.sub { background: #1d4ed8; }
    
    .tree-post { background: #000; border: 1px solid #333; border-radius: 8px; margin-bottom: 8px; }
    .tree-post-header { display: flex; align-items: center; gap: 8px; padding: 10px; border-bottom: 1px solid #222; }
    .tree-post-num { width: 24px; height: 24px; background: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .tree-post-type { font-size: 10px; opacity: 0.6; }
    .tree-post-body { padding: 10px; }
    .tree-post-images { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .tree-post-img { width: 50px; height: 50px; background: #222; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border: 1px dashed #444; }
    
    .template-item { background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .template-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .template-preview { font-size: 10px; opacity: 0.6; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .template-meta { display: flex; gap: 8px; margin-top: 8px; }
    
    .history-item { background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .history-date { font-size: 10px; opacity: 0.5; }
    .history-status { font-size: 9px; padding: 2px 6px; border-radius: 4px; }
    .history-status.sent { background: #22c55e; }
    .history-status.scheduled { background: #f59e0b; }
    .history-content { font-size: 11px; line-height: 1.5; opacity: 0.8; }
    
    .schedule-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #000; border: 1px solid #333; border-radius: 8px; margin-bottom: 8px; }
    .schedule-time { font-size: 11px; font-weight: 600; min-width: 80px; }
    .schedule-content { flex: 1; font-size: 10px; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .image-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .image-item { aspect-ratio: 1; background: #1a1a1a; border-radius: 6px; position: relative; cursor: pointer; overflow: hidden; border: 2px solid transparent; }
    .image-item.selected { border-color: #e63946; }
    .image-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .image-item-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); color: #888; font-size: 9px; text-align: center; padding: 4px; }
    .image-item-order { position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; background: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .image-item-name { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 3px 4px; font-size: 8px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; z-index: 1000; display: none; }
    .toast.show { display: block; animation: fadeInOut 2s ease; }
    @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  
  <script>
    // 認証情報
    const ADMIN_ID = 'admin';
    const ADMIN_PASS = 'manga2026';
    
    // LocalStorageキー
    const STORAGE_KEYS = {
      siteSettings: 'mangahub_site',
      mangaList: 'mangahub_manga',
      xAccounts: 'mangahub_x_accounts',
      xTemplates: 'mangahub_x_templates',
      xHistory: 'mangahub_x_history',
      xSchedule: 'mangahub_x_schedule',
      xImages: 'mangahub_x_images',
      imageFolders: 'mangahub_image_folders'
    };
    
    // データ
    let siteSettings = { siteName: 'MangaHub', mainTitle: '気になる漫画を試し読み', badge: '🔥 今週の注目' };
    
    let mangaList = [
      { id: 1, title: '甘々同棲ライフ', genre: '甘々いちゃラブ', rating: 4.8, badge: 'NEW', pages: 6, description: '一途で素直な彼女との甘い同棲生活。', type: 'A' },
      { id: 2, title: '年上彼女の誘惑', genre: '大人の余裕系', rating: 4.7, badge: '人気', pages: 8, description: '包容力抜群のお姉さん上司との恋愛。', type: 'B' },
      { id: 3, title: 'メイドカフェ物語', genre: 'コスチューム系', rating: 4.6, badge: null, pages: 5, description: 'メイド服が眩しい！', type: 'C' },
      { id: 4, title: 'エルフと異世界生活', genre: 'ファンタジー', rating: 4.9, badge: '人気', pages: 7, description: '異世界ファンタジー', type: 'D' },
      { id: 5, title: 'ドタバタ学園コメディ', genre: 'ラブコメ', rating: 4.5, badge: null, pages: 4, description: 'テンポ抜群のラブコメ', type: 'E' },
      { id: 6, title: '小悪魔彼女の罠', genre: '小悪魔系', rating: 4.7, badge: null, pages: 6, description: '駆け引きラブ', type: 'F' },
    ];
    
    let xAccounts = [
      { id: 1, name: 'メインアカウント', handle: '@manga_main', type: 'main', apiKey: '', apiSecret: '', accessToken: '', accessSecret: '' },
      { id: 2, name: 'サブアカウント1', handle: '@manga_sub1', type: 'sub', apiKey: '', apiSecret: '', accessToken: '', accessSecret: '' },
    ];
    
    let xTemplates = [
      { id: 1, name: '新作紹介テンプレ', content: '📚 新作のご紹介！\n\n{{title}}\n\n#漫画 #試し読み', createdAt: '2026-04-01' },
    ];
    
    let xHistory = [];
    let xSchedule = [];
    let xImages = [];
    let imageFolders = {}; // { folderName: [{ name, dataUrl }] }
    
    let currentTreePosts = [{ id: 1, type: 'tweet', content: '', images: [], imageCount: 4 }];
    let selectedImages = [];
    
    // State
    let isLoggedIn = false;
    let showLoginError = false;
    let adminTab = 'site';
    let xSubTab = 'accounts';
    let selectedAccountId = 1;

    // Load/Save
    function loadData() {
      try {
        const site = localStorage.getItem(STORAGE_KEYS.siteSettings);
        if (site) siteSettings = JSON.parse(site);
        const manga = localStorage.getItem(STORAGE_KEYS.mangaList);
        if (manga) mangaList = JSON.parse(manga);
        const accounts = localStorage.getItem(STORAGE_KEYS.xAccounts);
        if (accounts) xAccounts = JSON.parse(accounts);
        const templates = localStorage.getItem(STORAGE_KEYS.xTemplates);
        if (templates) xTemplates = JSON.parse(templates);
        const history = localStorage.getItem(STORAGE_KEYS.xHistory);
        if (history) xHistory = JSON.parse(history);
        const schedule = localStorage.getItem(STORAGE_KEYS.xSchedule);
        if (schedule) xSchedule = JSON.parse(schedule);
        const images = localStorage.getItem(STORAGE_KEYS.xImages);
        if (images) xImages = JSON.parse(images);
        const folders = localStorage.getItem(STORAGE_KEYS.imageFolders);
        if (folders) imageFolders = JSON.parse(folders);
      } catch (e) { console.error('Load error:', e); }
    }

    function saveData(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify(data));
        showToast('保存しました');
      } catch (e) { showToast('保存に失敗しました'); }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = isLoggedIn ? renderAdmin() : renderLogin();
    }

    function renderLogin() {
      return `
        <div class="login-overlay">
          <div class="login-box">
            <h2 class="login-title">🔐 管理者ログイン</h2>
            <div class="login-field">
              <label class="login-label">ユーザーID</label>
              <input type="text" id="loginId" class="login-input" placeholder="ID を入力">
            </div>
            <div class="login-field">
              <label class="login-label">パスワード</label>
              <input type="password" id="loginPass" class="login-input" placeholder="パスワードを入力">
            </div>
            <button class="login-btn" onclick="tryLogin()">ログイン</button>
            ${showLoginError ? '<p class="login-error">ID またはパスワードが違います</p>' : ''}
          </div>
        </div>`;
    }

    function renderAdmin() {
      return `
        <header class="admin-header">
          <div class="admin-logo">
            <div class="admin-logo-icon">⚙️</div>
            <span class="admin-logo-text">管理画面</span>
          </div>
          <div style="display:flex;gap:8px">
            <a href="index.html" class="btn btn-small">サイトを見る</a>
            <button class="admin-logout" onclick="logout()">ログアウト</button>
          </div>
        </header>
        
        <div class="admin-tabs">
          <button class="admin-tab ${adminTab==='site'?'active':''}" onclick="setAdminTab('site')">サイト</button>
          <button class="admin-tab ${adminTab==='works'?'active':''}" onclick="setAdminTab('works')">作品</button>
          <button class="admin-tab ${adminTab==='x'?'active':''}" onclick="setAdminTab('x')">X運用</button>
        </div>
        
        <section class="admin-section">
          ${adminTab==='site' ? renderAdminSite() : ''}
          ${adminTab==='works' ? renderAdminWorks() : ''}
          ${adminTab==='x' ? renderAdminX() : ''}
        </section>`;
    }

    function renderAdminSite() {
      return `
        <div class="admin-group">
          <h3 class="admin-group-title"><span>●</span> サイト基本情報</h3>
          <div class="admin-card">
            <div class="admin-field">
              <label class="admin-label">サイト名</label>
              <input type="text" id="siteName" class="admin-input" value="${siteSettings.siteName}">
            </div>
            <div class="admin-field">
              <label class="admin-label">バッジテキスト</label>
              <input type="text" id="siteBadge" class="admin-input" value="${siteSettings.badge}">
            </div>
            <div class="admin-field">
              <label class="admin-label">メインタイトル</label>
              <input type="text" id="siteTitle" class="admin-input" value="${siteSettings.mainTitle}">
            </div>
          </div>
        </div>
        <button class="admin-save" onclick="saveSiteSettings()">変更を保存</button>`;
    }

    function renderAdminWorks() {
      return `
        <button style="width:100%;background:#111;border:2px dashed #333;color:#fff;padding:14px;border-radius:10px;margin-bottom:16px;cursor:pointer" onclick="addNewManga()">+ 新規作品を追加</button>
        ${mangaList.map(m => `
          <div class="admin-card">
            <div style="display:flex;gap:12px">
              <div style="width:50px;height:70px;background:#333;border-radius:6px;flex-shrink:0"></div>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:700;margin-bottom:2px">${m.title}</div>
                <div style="font-size:10px;opacity:0.6;margin-bottom:6px">${m.genre} | ★${m.rating}</div>
                <div style="display:flex;gap:6px">
                  <button class="btn btn-small btn-secondary">編集</button>
                  <button class="btn btn-small btn-outline" onclick="deleteManga(${m.id})">削除</button>
                </div>
              </div>
            </div>
          </div>
        `).join('')}`;
    }

    function renderAdminX() {
      return `
        <div class="x-subtabs">
          <button class="x-subtab ${xSubTab==='accounts'?'active':''}" onclick="setXSubTab('accounts')">アカウント</button>
          <button class="x-subtab ${xSubTab==='editor'?'active':''}" onclick="setXSubTab('editor')">投稿作成</button>
          <button class="x-subtab ${xSubTab==='templates'?'active':''}" onclick="setXSubTab('templates')">テンプレート</button>
          <button class="x-subtab ${xSubTab==='schedule'?'active':''}" onclick="setXSubTab('schedule')">スケジュール</button>
          <button class="x-subtab ${xSubTab==='history'?'active':''}" onclick="setXSubTab('history')">送信履歴</button>
          <button class="x-subtab ${xSubTab==='images'?'active':''}" onclick="setXSubTab('images')">画像管理</button>
          <button class="x-subtab ${xSubTab==='scraper'?'active':''}" onclick="setXSubTab('scraper')">画像取得</button>
        </div>
        ${xSubTab==='accounts' ? renderXAccounts() : ''}
        ${xSubTab==='editor' ? renderXEditor() : ''}
        ${xSubTab==='templates' ? renderXTemplates() : ''}
        ${xSubTab==='schedule' ? renderXSchedule() : ''}
        ${xSubTab==='history' ? renderXHistory() : ''}
        ${xSubTab==='images' ? renderXImages() : ''}
        ${xSubTab==='scraper' ? renderXScraper() : ''}`;
    }

    function renderXAccounts() {
      return `
        <div class="admin-group">
          <h3 class="admin-group-title"><span>𝕏</span> 連携アカウント</h3>
          ${xAccounts.map(acc => `
            <div class="account-item ${acc.id === selectedAccountId ? 'active' : ''}" onclick="selectAccount(${acc.id})">
              <div class="account-avatar">𝕏</div>
              <div class="account-info">
                <div class="account-name">${acc.name}</div>
                <div class="account-handle">${acc.handle}</div>
              </div>
              <span class="account-type ${acc.type}">${acc.type === 'main' ? 'メイン' : 'サブ'}</span>
            </div>
          `).join('')}
          <button style="width:100%;background:#111;border:2px dashed #333;color:#fff;padding:12px;border-radius:8px;margin-top:8px;cursor:pointer" onclick="addAccount()">+ アカウント追加</button>
        </div>
        <div class="admin-group">
          <h3 class="admin-group-title"><span>🔑</span> API設定</h3>
          <div class="admin-card">
            <div class="admin-field"><label class="admin-label">API Key</label><input type="password" id="accApiKey" class="admin-input" value="${xAccounts.find(a=>a.id===selectedAccountId)?.apiKey||''}"></div>
            <div class="admin-field"><label class="admin-label">API Secret</label><input type="password" id="accApiSecret" class="admin-input" value="${xAccounts.find(a=>a.id===selectedAccountId)?.apiSecret||''}"></div>
            <div class="admin-field"><label class="admin-label">Access Token</label><input type="password" id="accAccessToken" class="admin-input" value="${xAccounts.find(a=>a.id===selectedAccountId)?.accessToken||''}"></div>
            <div class="admin-field"><label class="admin-label">Access Token Secret</label><input type="password" id="accAccessSecret" class="admin-input" value="${xAccounts.find(a=>a.id===selectedAccountId)?.accessSecret||''}"></div>
            <button class="btn btn-small btn-secondary" onclick="testConnection()">接続テスト</button>
          </div>
        </div>
        <button class="admin-save" onclick="saveAccounts()">アカウント設定を保存</button>`;
    }

    function renderXEditor() {
      const acc = xAccounts.find(a => a.id === selectedAccountId);
      return `
        <div class="admin-group">
          <h3 class="admin-group-title"><span>✏️</span> ツリー投稿作成</h3>
          <div class="admin-card" style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px">投稿先: <strong>${acc?.handle || '未選択'}</strong></span>
              <select class="admin-select" style="width:auto;padding:6px 10px" onchange="selectAccount(Number(this.value))">
                ${xAccounts.map(a => `<option value="${a.id}" ${a.id===selectedAccountId?'selected':''}>${a.handle}</option>`).join('')}
              </select>
            </div>
          </div>
          ${currentTreePosts.map((post, idx) => `
            <div class="tree-post">
              <div class="tree-post-header">
                <div class="tree-post-num">${idx + 1}</div>
                <span class="tree-post-type">${idx === 0 ? '親ツイート' : 'リプライ'}</span>
                <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
                  <label style="font-size:9px;opacity:0.6">画像:</label>
                  <select class="admin-select" style="width:50px;padding:4px" onchange="setImageCount(${idx}, this.value)">
                    ${[1,2,3,4].map(n => `<option value="${n}" ${post.imageCount===n?'selected':''}>${n}</option>`).join('')}
                  </select>
                  ${idx > 0 ? `<button class="btn btn-small btn-danger" onclick="removeTreePost(${idx})">削除</button>` : ''}
                </div>
              </div>
              <div class="tree-post-body">
                <textarea class="admin-textarea" placeholder="投稿内容を入力..." onchange="updateTreePost(${idx}, this.value)">${post.content}</textarea>
                <div class="tree-post-images">
                  ${Array(post.imageCount).fill(0).map((_, i) => `<div class="tree-post-img" onclick="setXSubTab('images')">+</div>`).join('')}
                </div>
              </div>
            </div>
          `).join('')}
          <button style="width:100%;background:#222;border:1px dashed #444;color:#fff;padding:10px;border-radius:8px;cursor:pointer" onclick="addTreePost()">+ リプライを追加</button>
        </div>
        <div class="admin-group">

    // Images
    function uploadFolder(input) {
      const files = Array.from(input.files).filter(f => f.type.startsWith('image/')).sort((a, b) => a.name.localeCompare(b.name));
      let loaded = 0;
      files.forEach(f => {
        const reader = new FileReader();
        reader.onload = (e) => {
          xImages.push({ name: f.name, dataUrl: e.target.result });
          loaded++;
          if (loaded === files.length) {
            saveData(STORAGE_KEYS.xImages, xImages);
            render();
          }
        };
        reader.readAsDataURL(f);
      });
      if (files.length === 0) showToast('画像ファイルが見つかりません');

    // Scraper - 並列ダウンロード対応版
    async function scrapeImages() {
      const urlText = document.getElementById('scraperUrl').value.trim();
      const folder = document.getElementById('scraperFolder').value.trim() || 'scraped_images';
      
      if (!urlText) { showToast('URLを入力してください'); return; }
      
      // 複数URLを分割
      const urls = urlText.split('\n').map(u => u.trim()).filter(u => u.startsWith('http'));
      if (urls.length === 0) { showToast('有効なURLを入力してください'); return; }
      
      const btn = document.getElementById('scrapeBtn');
      const resultDiv = document.getElementById('scrapeResult');
      
      btn.disabled = true;
      btn.textContent = '取得中...';
      resultDiv.innerHTML = `<div class="admin-card"><p style="font-size:11px">🔄 ${urls.length}ページを解析中...</p></div>`;
      
      const proxy = (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`;
      
      try {
        let allImageUrls = [];
        
        for (const url of urls) {
          let imageUrls = [];
          
          if (url.includes('dlsite.com')) {
            // DLsite: RJ番号から画像URLを生成し、存在確認
            const rjMatch = url.match(/RJ(\d+)/i);
            if (rjMatch) {
              const rjNum = rjMatch[1];
              const rjId = 'RJ' + rjNum;
              const folderNum = Math.ceil(parseInt(rjNum) / 1000) * 1000;
              const folderId = 'RJ' + String(folderNum).padStart(rjNum.length, '0');
              let workType = 'doujin';
              if (url.includes('/pro/')) workType = 'professional';
              else if (url.includes('/girls/')) workType = 'girls';
              
              // メイン画像
              imageUrls.push(`https://img.dlsite.jp/modpub/images2/work/${workType}/${folderId}/${rjId}_img_main.jpg`);
              
              // サンプル画像（1〜15枚まで試行、連続で失敗したら終了）
              for (let i = 1; i <= 15; i++) {
                imageUrls.push(`https://img.dlsite.jp/modpub/images2/work/${workType}/${folderId}/${rjId}_img_smp${i}.jpg`);
              }
            }
          } else {
            // その他のサイト: HTMLから画像を抽出
            try {
              const response = await fetch(proxy(url));
              if (!response.ok) continue;
              const html = await response.text();
              
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              const baseUrl = new URL(url);
              
              const urlNumMatch = url.match(/\/(\d{3,})\/?/);
              const urlNumber = urlNumMatch ? urlNumMatch[1] : null;
              const imgAttrs = ['src', 'data-src', 'data-lazy-src', 'data-original'];
              
              doc.querySelectorAll('img').forEach(img => {
                for (const attr of imgAttrs) {
                  let src = img.getAttribute(attr);
                  if (src) {
                    if (src.startsWith('//')) src = 'https:' + src;
                    else if (src.startsWith('/')) src = baseUrl.origin + src;
                    
                    if (src.startsWith('http')) {
                      if (urlNumber && src.includes(urlNumber)) {
                        imageUrls.push(src);
                      } else if (!urlNumber) {
                        const srcLower = src.toLowerCase();
                        if (!srcLower.includes('banner') && !srcLower.includes('logo') && !srcLower.includes('icon')) {
                          imageUrls.push(src);
                        }
                      }
                    }
                    break;
                  }
                }
              });
            } catch (e) { console.log('Parse error:', e); }
          }
          
          allImageUrls = allImageUrls.concat(imageUrls);
        }
        
        const uniqueUrls = [...new Set(allImageUrls)];
        
        if (uniqueUrls.length === 0) {
          resultDiv.innerHTML = '<div class="admin-card"><p style="font-size:11px;color:#f59e0b">⚠️ 画像が見つかりませんでした</p></div>';
          btn.disabled = false;
          btn.textContent = '🚀 高速取得';
          return;
        }
        
        resultDiv.innerHTML = `<div class="admin-card"><p style="font-size:11px">🚀 画像をダウンロード中...</p><div style="background:#333;height:6px;border-radius:3px;margin-top:8px"><div style="background:#e63946;height:100%;width:0%;border-radius:3px;transition:width 0.2s" id="progressFill"></div></div><p style="font-size:10px;opacity:0.5;margin-top:6px" id="progressText">0/0</p></div>`;
        
        // 画像を1枚ずつダウンロード（失敗が続いたら停止）
        const downloadedImages = [];
        let consecutiveFails = 0;
        let completed = 0;
        
        for (const imgUrl of uniqueUrls) {
          try {
            const response = await fetch(proxy(imgUrl));
            
            if (!response.ok) {
              consecutiveFails++;
              if (consecutiveFails >= 3) break; // 3連続失敗で終了
              continue;
            }
            
            const blob = await response.blob();
            
            if (blob.size < 3000 || !blob.type.startsWith('image/')) {
              consecutiveFails++;
              if (consecutiveFails >= 3) break;
              continue;
            }
            
            consecutiveFails = 0; // 成功したらリセット
            
            const dataUrl = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
            
            const ext = blob.type.split('/')[1] || 'jpg';
            downloadedImages.push({ 
              name: `${folder}_${String(downloadedImages.length + 1).padStart(3, '0')}.${ext}`, 
              dataUrl 
            });
            
          } catch (e) {
            consecutiveFails++;
            if (consecutiveFails >= 3) break;
          }
          
          completed++;
          const progress = document.getElementById('progressFill');
          const text = document.getElementById('progressText');
          if (progress) progress.style.width = `${(downloadedImages.length / Math.max(downloadedImages.length, 1)) * 100}%`;
          if (text) text.textContent = `${downloadedImages.length}枚取得`;
        }
        
        if (downloadedImages.length > 0) {
          imageFolders[folder] = downloadedImages;
          localStorage.setItem(STORAGE_KEYS.imageFolders, JSON.stringify(imageFolders));
          
          resultDiv.innerHTML = `<div class="admin-card" style="border-color:#22c55e"><p style="font-size:12px;color:#22c55e">✅ ${downloadedImages.length}枚を保存しました</p><button class="btn btn-small" style="margin-top:8px" onclick="loadFolderToLibrary('${folder}');xSubTab='images';render();">ライブラリに追加</button></div>`;
          showToast(`${downloadedImages.length}枚保存`);
        } else {
          resultDiv.innerHTML = '<div class="admin-card"><p style="font-size:11px;color:#f59e0b">⚠️ ダウンロードに失敗しました</p></div>';
        }
        
        render();
        
      } catch (e) {
        console.error('Scrape error:', e);
        resultDiv.innerHTML = '<div class="admin-card"><p style="font-size:11px;color:#e63946">❌ エラーが発生しました</p></div>';
      }
      
      btn.disabled = false;
      btn.textContent = '🚀 高速取得';
    }
    
    function copyUrls(urls) {
      navigator.clipboard.writeText(urls).then(() => showToast('URLをコピーしました'));
    }
    
    // フォルダの画像をライブラリに追加
    function loadFolderToLibrary(folderName) {
      if (!imageFolders[folderName]) return;
      
      const images = imageFolders[folderName];
      images.forEach(img => {
        // 重複チェック
        if (!xImages.find(x => x.name === img.name)) {
          xImages.push(img);
        }
      });
      
      saveData(STORAGE_KEYS.xImages, xImages);
      showToast(`${images.length}枚をライブラリに追加しました`);
      xSubTab = 'images';
      render();
    }
    
    // フォルダを削除
    function deleteFolder(folderName) {
      if (confirm(`「${folderName}」を削除しますか？`)) {
        delete imageFolders[folderName];
        localStorage.setItem(STORAGE_KEYS.imageFolders, JSON.stringify(imageFolders));
        showToast('フォルダを削除しました');
        render();
      }
    }

    // Init
    loadData();
    render();
  </script>
