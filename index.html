    function checkHash() {

    function calculateResult() {
      const counts = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
      diagAnswers.forEach(t => counts[t]++);
      let max = 0, types = [];
      for (const t in counts) { if (counts[t] > max) { max = counts[t]; types = [t]; } else if (counts[t] === max && counts[t] > 0) types.push(t); }
      return types.length > 1 && types.includes(diagAnswers[0]) ? diagAnswers[0] : types[0];
    }

              <div class="history-header">
                <span class="history-date">${h.date} ${h.time}</span>
                <span class="history-status ${h.status}">${h.status === 'sent' ? '送信済' : h.status === 'scheduled' ? '予約中' : '失敗'}</span>
              </div>
              <div class="history-content">${h.content}</div>
              <div style="margin-top:8px;display:flex;gap:6px">
                <button class="btn btn-small btn-secondary" onclick="reuseHistory(${h.id})">再利用</button>
              </div>
            </div>
          `).join('')}
        </div>`;
    }

    function renderXImages() {
      return `
        <div class="admin-group"><h3 class="admin-group-title"><span>🖼️</span> 画像ライブラリ</h3>
          <div class="admin-card" style="margin-bottom:10px">
            <label style="display:block;font-size:11px;margin-bottom:8px">フォルダから一括アップロード</label>
            <input type="file" id="imageFolder" webkitdirectory multiple style="font-size:11px" onchange="uploadFolder(this)">
          </div>
          <div class="image-grid">
            ${xImages.length === 0 ? '<p style="grid-column:span 4;font-size:11px;opacity:0.5;text-align:center;padding:20px">画像がありません</p>' : xImages.map((img, idx) => `
              <div class="image-item ${selectedImages.includes(idx)?'selected':''}" onclick="toggleImageSelect(${idx})">
                ${img.name.substring(0,6)}
                ${selectedImages.includes(idx) ? `<div class="image-item-order">${selectedImages.indexOf(idx)+1}</div>` : ''}
              </div>
            `).join('')}
          </div>
          ${selectedImages.length > 0 ? `<p style="font-size:10px;opacity:0.6;margin-top:8px">選択中: ${selectedImages.length}枚（名前順にソート）</p>` : ''}
        </div>`;
    }

    function renderXScraper() {
      return `
        <div class="admin-group"><h3 class="admin-group-title"><span>🔍</span> URL画像取得</h3>
          <div class="admin-card">
            <div class="admin-field">
              <label class="admin-label">画像取得元URL</label>
              <input type="text" id="scraperUrl" class="admin-input" placeholder="https://example.com/page">
            </div>
            <div class="admin-field">
              <label class="admin-label">保存先フォルダ名</label>
              <input type="text" id="scraperFolder" class="admin-input" placeholder="folder_name" value="scraped_images">
            </div>
            <button class="btn" onclick="scrapeImages()">画像を取得</button>
          </div>
          <div id="scrapeResult" style="margin-top:12px"></div>
        </div>
        <div class="admin-group"><h3 class="admin-group-title"><span>ℹ️</span> 使い方</h3>
          <div class="admin-card">
            <p style="font-size:11px;line-height:1.6;opacity:0.8">
              1. 画像を取得したいページのURLを入力<br>
              2. 保存先フォルダ名を指定<br>
              3.「画像を取得」ボタンをクリック<br>
              ※ CORSの制限により一部サイトでは取得できません
            </p>
          </div>
        </div>`;
    }

    // Actions
    function tryLogin() { const id = document.getElementById('loginId').value; const pass = document.getElementById('loginPass').value; if (id === ADMIN_ID && pass === ADMIN_PASS) { isAdminLoggedIn = true; showLoginError = false; currentPage = 'admin'; } else showLoginError = true; render(); }
    function logout() { isAdminLoggedIn = false; window.location.hash = ''; currentPage = 'home'; render(); }
    function startDiag() { diagStep = 0; render(); }
    function answer(t) { diagAnswers.push(t); if (diagStep < 4) diagStep++; else { resultType = calculateResult(); showResult = true; } render(); }
    function resetDiag() { diagStep = -1; diagAnswers = []; showResult = false; resultType = null; render(); }
    function openManga(id) { selectedManga = mangaList.find(m => m.id === id); currentPage = 'detail'; window.scrollTo(0, 0); render(); }
    function goHome() { window.location.hash = ''; currentPage = 'home'; selectedManga = null; render(); }
    function setAdminTab(t) { adminTab = t; render(); }
    function setXSubTab(t) { xSubTab = t; render(); }

    // Site settings
    function saveSiteSettings() {
      siteSettings.siteName = document.getElementById('siteName').value;
      siteSettings.badge = document.getElementById('siteBadge').value;
      siteSettings.mainTitle = document.getElementById('siteTitle').value;
      saveData(STORAGE_KEYS.siteSettings, siteSettings);
    }

    // Manga
    function addNewManga() { const id = mangaList.length + 1; mangaList.push({ id, title: '新規作品', genre: 'ジャンル', rating: 4.0, badge: 'NEW', pages: 5, description: '説明文', type: 'A' }); saveData(STORAGE_KEYS.mangaList, mangaList); render(); }
    function editManga(id) { showToast('編集機能は開発中です'); }
    function deleteManga(id) { mangaList = mangaList.filter(m => m.id !== id); saveData(STORAGE_KEYS.mangaList, mangaList); render(); }

    // X Accounts
    function selectAccount(id) { selectedAccountId = id; render(); }
    function addAccount() { const id = xAccounts.length + 1; xAccounts.push({ id, name: `アカウント${id}`, handle: `@account_${id}`, type: 'sub', apiKey: '', apiSecret: '', accessToken: '', accessSecret: '' }); saveData(STORAGE_KEYS.xAccounts, xAccounts); render(); }
    function editAccount(id) { showToast('アカウント編集画面を開きます'); }
    function saveAccounts() {
      const acc = xAccounts.find(a => a.id === selectedAccountId);
      if (acc) {
        acc.apiKey = document.getElementById('accApiKey').value;
        acc.apiSecret = document.getElementById('accApiSecret').value;
        acc.accessToken = document.getElementById('accAccessToken').value;
        acc.accessSecret = document.getElementById('accAccessSecret').value;
      }
      saveData(STORAGE_KEYS.xAccounts, xAccounts);
    }
    function testConnection() { showToast('接続テスト中...（モック）'); }

    // Tree posts
    function addTreePost() { currentTreePosts.push({ id: currentTreePosts.length + 1, type: 'reply', content: '', images: [], imageCount: 4 }); render(); }
    function removeTreePost(idx) { currentTreePosts.splice(idx, 1); render(); }
    function updateTreePost(idx, content) { currentTreePosts[idx].content = content; }
    function setImageCount(idx, count) { currentTreePosts[idx].imageCount = parseInt(count); render(); }
    function removeImage(postIdx, imgIdx) { currentTreePosts[postIdx].images.splice(imgIdx, 1); render(); }
    function openImagePicker(postIdx) { showToast('画像管理から選択してください'); xSubTab = 'images'; render(); }

    // Templates
    function saveAsTemplate() {
      const name = prompt('テンプレート名を入力:');
      if (!name) return;
      const content = currentTreePosts.map(p => p.content).join('\n---\n');
      xTemplates.push({ id: xTemplates.length + 1, name, content, createdAt: new Date().toISOString().split('T')[0] });
      saveData(STORAGE_KEYS.xTemplates, xTemplates);
      showToast('テンプレートを保存しました');
    }
    function useTemplate(id) { const t = xTemplates.find(x => x.id === id); if (t) { currentTreePosts = [{ id: 1, type: 'tweet', content: t.content, images: [], imageCount: 4 }]; xSubTab = 'editor'; render(); } }
    function editTemplate(id) { showToast('テンプレート編集は開発中です'); }
    function deleteTemplate(id) { xTemplates = xTemplates.filter(t => t.id !== id); saveData(STORAGE_KEYS.xTemplates, xTemplates); render(); }
    function createTemplate() { xTemplates.push({ id: xTemplates.length + 1, name: '新規テンプレート', content: '', createdAt: new Date().toISOString().split('T')[0] }); saveData(STORAGE_KEYS.xTemplates, xTemplates); render(); }

    // Post
    function postNow() {
      const content = currentTreePosts.map(p => p.content).join(' | ');
      xHistory.unshift({ id: xHistory.length + 1, date: new Date().toLocaleDateString('ja-JP'), time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}), content, status: 'sent' });
      saveData(STORAGE_KEYS.xHistory, xHistory);
      showToast('投稿しました（モック）');
      currentTreePosts = [{ id: 1, type: 'tweet', content: '', images: [], imageCount: 4 }];
      render();
    }
    function schedulePost() {
      const date = prompt('予約日時 (例: 2026-04-20 15:00)');
      if (!date) return;
      const content = currentTreePosts.map(p => p.content).join(' | ');
      const [d, t] = date.split(' ');
      xSchedule.push({ id: xSchedule.length + 1, date: d, time: t || '12:00', content });
      saveData(STORAGE_KEYS.xSchedule, xSchedule);
      showToast('予約しました');
      render();
    }
    function cancelSchedule(id) { xSchedule = xSchedule.filter(s => s.id !== id); saveData(STORAGE_KEYS.xSchedule, xSchedule); render(); }
    function reuseHistory(id) { const h = xHistory.find(x => x.id === id); if (h) { currentTreePosts = [{ id: 1, type: 'tweet', content: h.content, images: [], imageCount: 4 }]; xSubTab = 'editor'; render(); } }

    // Images
    function uploadFolder(input) {
      const files = Array.from(input.files).sort((a, b) => a.name.localeCompare(b.name));
      files.forEach(f => { xImages.push({ name: f.name, data: URL.createObjectURL(f) }); });
      saveData(STORAGE_KEYS.xImages, xImages.map(i => ({ name: i.name }))); // Only save names
      showToast(`${files.length}枚の画像を追加しました`);
      render();
    }
    function toggleImageSelect(idx) {
      const i = selectedImages.indexOf(idx);
      if (i >= 0) selectedImages.splice(i, 1);
      else selectedImages.push(idx);
      render();
    }

    // Scraper (mock)
    function scrapeImages() {
      const url = document.getElementById('scraperUrl').value;
      const folder = document.getElementById('scraperFolder').value;
      if (!url) { showToast('URLを入力してください'); return; }
      document.getElementById('scrapeResult').innerHTML = `
        <div class="admin-card">
          <p style="font-size:11px;color:#f59e0b">⚠️ ブラウザのセキュリティ制限により、直接の画像取得は制限されています。</p>
          <p style="font-size:10px;opacity:0.7;margin-top:8px">実際の運用では、サーバーサイドスクリプト（Python/Node.js等）での取得を推奨します。</p>
          <p style="font-size:10px;opacity:0.5;margin-top:8px">URL: ${url}<br>フォルダ: ${folder}</p>
        </div>`;
      showToast('取得機能はサーバー側で実装が必要です');
    }

    // Init
    loadData();
    window.addEventListener('hashchange', checkHash);
    checkHash();
  </script>
</body>
</html>
