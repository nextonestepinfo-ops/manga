<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MangaHub - 漫画試し読み</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; overflow-x: hidden; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 390px; min-height: 100vh; background: #000; overflow-y: auto; }
    button, input { font-family: inherit; outline: none; }
    
    .header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 32px; height: 32px; background: #e63946; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
    .logo-text { font-size: 16px; font-weight: 700; }
    .search-box { background: #111; border: 1px solid #333; border-radius: 18px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; }
    .search-input { background: transparent; border: none; color: #fff; width: 80px; font-size: 12px; }
    
    .hero { padding: 20px 16px 16px; text-align: center; }
    .badge { display: inline-block; background: #e63946; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; margin-bottom: 10px; }
    .hero h1 { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 6px; }
    .hero h1 span { color: #e63946; }
    .hero p { font-size: 11px; opacity: 0.7; }
    
    .diagnosis { padding: 0 16px 16px; }
    .diagnosis-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
    .diagnosis-header { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .diagnosis-icon { width: 24px; height: 24px; background: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .diagnosis-title { font-size: 12px; font-weight: 700; }
    .diagnosis-step { margin-left: auto; font-size: 10px; opacity: 0.4; }
    .diagnosis-step.complete { color: #e63946; opacity: 1; font-weight: 600; }
    .diagnosis-question { background: #222; border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 13px; font-weight: 600; text-align: center; }
    .diagnosis-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .diagnosis-option { background: #000; border: 1px solid #333; color: #fff; padding: 12px 8px; border-radius: 10px; cursor: pointer; font-size: 11px; text-align: center; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .diagnosis-option:hover { background: #111; border-color: #e63946; }
    .diagnosis-option-emoji { font-size: 20px; }
    .diagnosis-option-text { font-size: 10px; line-height: 1.3; }
    .diagnosis-result { background: #222; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .diagnosis-result-type { color: #e63946; font-size: 14px; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .diagnosis-result-desc { font-size: 12px; line-height: 1.6; opacity: 0.9; text-align: center; }
    .diagnosis-result-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .diagnosis-result-tag { background: #e63946; padding: 4px 8px; border-radius: 6px; font-size: 10px; }
    .diagnosis-recommend { display: flex; gap: 8px; margin-bottom: 10px; }
    .diagnosis-recommend-item { flex: 1; background: #000; border: 1px solid #333; border-radius: 8px; padding: 8px; cursor: pointer; }
    .diagnosis-recommend-item:first-child { border-color: #e63946; }
    .diagnosis-recommend-thumb { aspect-ratio: 1446/2048; background: #333; border-radius: 4px; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; font-size: 9px; overflow: hidden; }
    .diagnosis-recommend-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .diagnosis-recommend-placeholder { opacity: 0.5; }
    .diagnosis-recommend-title { font-size: 10px; font-weight: 600; text-align: center; }
    .btn-reset { width: 100%; background: transparent; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-top: 10px; }
    .btn-start { width: 100%; background: #e63946; color: #fff; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; }
    
    .section { padding: 0 16px; }
    .section-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .manga-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .manga-card { background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; }
    .manga-thumb { aspect-ratio: 1446/2048; background: #333; position: relative; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    .manga-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .manga-thumb-placeholder { opacity: 0.5; }
    .manga-badge { position: absolute; top: 4px; left: 4px; background: #e63946; color: #fff; padding: 2px 5px; border-radius: 4px; font-size: 8px; font-weight: 700; }
    .manga-info { padding: 8px; }
    .manga-title { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .manga-meta { display: flex; justify-content: space-between; }
    .manga-genre { font-size: 9px; opacity: 0.6; }
    .manga-rating { font-size: 9px; color: #e63946; }
    
    .ad-slot { grid-column: span 2; background: #1a1a1a; border: 1px dashed #333; border-radius: 8px; padding: 16px; text-align: center; }
    .ad-label { font-size: 10px; opacity: 0.3; }
    .ad-placeholder { margin-top: 6px; height: 50px; background: #222; border-radius: 4px; }
    
    .pagination { margin-top: 24px; margin-bottom: 24px; }
    .pagination-nav { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .pagination-pages { display: flex; align-items: center; gap: 4px; }
    .pagination-arrow { width: 36px; height: 36px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .pagination-arrow:hover:not(.disabled) { background: #333; }
    .pagination-arrow.disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination-num { width: 36px; height: 36px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .pagination-num:hover { background: #222; }
    .pagination-num.active { background: #e63946; border-color: #e63946; }
    .pagination-dots { color: #666; padding: 0 4px; }
    .pagination-info { text-align: center; font-size: 11px; opacity: 0.5; margin-top: 10px; }
    
    .footer { padding: 20px 16px; border-top: 1px solid #222; text-align: center; }
    .footer p { font-size: 11px; opacity: 0.4; }
    
    .detail-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #222; }
    .back-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; flex-shrink: 0; }
    .detail-title { font-size: 14px; font-weight: 700; flex: 1; line-height: 1.4; word-break: break-word; }
    
    .manga-detail { padding: 20px 16px; border-bottom: 1px solid #222; }
    .manga-detail-inner { display: flex; gap: 16px; }
    .manga-cover { width: 100px; aspect-ratio: 1446/2048; background: #333; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; overflow: hidden; }
    .manga-cover img { width: 100%; height: 100%; object-fit: cover; }
    .manga-cover-placeholder { opacity: 0.5; }
    .manga-detail-info { flex: 1; min-width: 0; }
    .manga-detail-badges { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .manga-detail-badge { background: #e63946; color: #fff; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
    .manga-detail-rating { color: #e63946; font-size: 12px; }
    .manga-detail-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; line-height: 1.4; word-break: break-word; }
    .manga-detail-genre { font-size: 12px; opacity: 0.6; margin-bottom: 8px; }
    .manga-detail-desc { font-size: 12px; opacity: 0.8; line-height: 1.6; }
    
    .reader { padding: 16px; }
    .reader-pages { display: flex; flex-direction: column; gap: 8px; }
    .reader-page { background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 14px; overflow: hidden; }
    .reader-page img { width: 100%; height: auto; display: block; border-radius: 8px; }
    .reader-page-placeholder { padding: 100px 0; opacity: 0.5; }
    .reader-page-num { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; font-size: 10px; }
    
    .cta { padding: 20px 16px; background: linear-gradient(180deg, transparent, rgba(230,57,70,0.1)); }
    .cta-box { background: #111; border: 2px solid #e63946; border-radius: 16px; padding: 24px 20px; text-align: center; }
    .cta-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .cta-subtitle { font-size: 13px; opacity: 0.7; margin-bottom: 20px; }
    .cta-btn { display: block; width: 100%; background: #e63946; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; text-decoration: none; }
    .cta-note { font-size: 10px; opacity: 0.4; margin-top: 12px; }
    
    .related { padding: 20px 16px; }
    .related-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .related-list { display: flex; gap: 12px; overflow-x: auto; }
    .related-item { flex-shrink: 0; width: 100px; cursor: pointer; }
    .related-thumb { aspect-ratio: 1446/2048; background: #333; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; overflow: hidden; }
    .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .related-thumb-placeholder { opacity: 0.5; }
    .related-name { font-size: 12px; font-weight: 600; }
    .related-rating { font-size: 10px; color: #e63946; }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    // LocalStorageキー（管理画面と共有）
    const STORAGE_KEYS = {
      siteSettings: 'mangahub_site',
      mangaList: 'mangahub_manga',
      tags: 'mangahub_tags',
      badges: 'mangahub_badges',
      imageFolders: 'mangahub_image_folders'
    };
    
    // デフォルトデータ
    let siteSettings = { siteName: 'MangaHub', mainTitle: '気になる漫画を試し読み', badge: '🔥 今週の注目' };
    
    let tagsMaster = [
      { id: 1, name: 'ラブコメ', color: '#ec4899' },
      { id: 2, name: 'ファンタジー', color: '#8b5cf6' },
      { id: 3, name: '学園', color: '#3b82f6' },
      { id: 4, name: '大人向け', color: '#f59e0b' },
      { id: 5, name: '癒し系', color: '#10b981' },
    ];
    
    let badgesMaster = [
      { id: 1, name: 'NEW', color: '#22c55e' },
      { id: 2, name: '人気', color: '#e63946' },
    ];
    
    let imageFolders = {};
    
    let mangaList = [
      { id: 1, title: '甘々同棲ライフ', genre: '甘々いちゃラブ', rating: 4.8, badge: 'NEW', tags: [1, 5], pages: 6, description: '一途で素直な彼女との甘い同棲生活。毎日が幸せいっぱい！', type: 'A', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 2, title: '年上彼女の誘惑', genre: '大人の余裕系', rating: 4.7, badge: '人気', tags: [1, 4], pages: 8, description: '包容力抜群のお姉さん上司との、大人の恋愛ストーリー', type: 'B', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 3, title: 'メイドカフェ物語', genre: 'コスチューム系', rating: 4.6, badge: null, tags: [1, 3], pages: 5, description: 'メイド服が眩しい！衣装映え抜群のシチュエーション', type: 'C', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 4, title: 'エルフと異世界生活', genre: 'ファンタジー', rating: 4.9, badge: '人気', tags: [2, 5], pages: 7, description: '異世界で出会ったエルフとの非日常ファンタジー', type: 'D', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 5, title: 'ドタバタ学園コメディ', genre: 'ラブコメ', rating: 4.5, badge: null, tags: [1, 3], pages: 4, description: '笑いが止まらない！テンポ抜群のラブコメディ', type: 'E', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 6, title: '小悪魔彼女の罠', genre: '小悪魔系', rating: 4.7, badge: null, tags: [1, 4], pages: 6, description: '翻弄される快感…小悪魔彼女との駆け引きラブ', type: 'F', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 7, title: '純愛ラブストーリー', genre: '甘々いちゃラブ', rating: 4.8, badge: null, tags: [1, 5], pages: 8, description: 'お互いの好意が伝わる、尊い純愛物語', type: 'A', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 8, title: 'OLの秘密の恋', genre: '大人の余裕系', rating: 4.6, badge: null, tags: [1, 4], pages: 5, description: 'オフィスで始まる、しっとり大人の恋愛', type: 'B', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 9, title: 'ナースの献身', genre: 'コスチューム系', rating: 4.5, badge: null, tags: [1, 3], pages: 4, description: 'ナース服が眩しい、病院ラブコメディ', type: 'C', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 10, title: 'サキュバスの誘惑', genre: 'ファンタジー', rating: 4.8, badge: null, tags: [2, 4], pages: 7, description: '魔界からやってきたサキュバスとの甘い生活', type: 'D', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 11, title: 'シェアハウス騒動記', genre: 'ラブコメ', rating: 4.4, badge: null, tags: [1, 3], pages: 6, description: '賑やかなシェアハウスでのドタバタラブコメ', type: 'E', imageFolder: null, likes: 0, dislikes: 0 },
      { id: 12, title: '秘密の関係', genre: '小悪魔系', rating: 4.6, badge: null, tags: [1, 4], pages: 5, description: '二人だけの秘密…刺激的な駆け引き', type: 'F', imageFolder: null, likes: 0, dislikes: 0 },
    ];
    
    function getBadgeColor(badgeName) {
      const badge = badgesMaster.find(b => b.name === badgeName);
      return badge ? badge.color : '#e63946';
    }
    
    function getMangaThumbnail(manga) {
      if (manga.imageFolder && imageFolders[manga.imageFolder] && imageFolders[manga.imageFolder].length > 0) {
        return imageFolders[manga.imageFolder][0].dataUrl;
      }
      return null;
    }
    
    function getMangaSamples(manga) {
      if (manga.imageFolder && imageFolders[manga.imageFolder] && imageFolders[manga.imageFolder].length > 1) {
        return imageFolders[manga.imageFolder].slice(1);
      }
      return [];
    }

    const diagnosisQuestions = [
      { question: '見た目で選ぶなら？', options: [
        { emoji: '🌿', text: '清楚・ナチュラル系', type: 'A' },
        { emoji: '💄', text: 'ギャル・派手め系', type: 'E' },
        { emoji: '🎀', text: 'かわいい・あざとい系', type: 'C' },
        { emoji: '👠', text: 'グラマラス・色気強め', type: 'B' },
      ]},
      { question: '年齢感で刺さるのは？', options: [
        { emoji: '😊', text: '同世代っぽい距離感', type: 'A' },
        { emoji: '✨', text: 'ちょい年上の余裕', type: 'B' },
        { emoji: '🍷', text: '大人っぽい包容力', type: 'B' },
        { emoji: '🔥', text: '熟れた魅力のある雰囲気', type: 'F' },
      ]},
      { question: 'どんな"癖"が刺さる？', options: [
        { emoji: '😈', text: '小悪魔・翻弄されたい', type: 'F' },
        { emoji: '🤍', text: '一途・尽くしてくれる', type: 'A' },
        { emoji: '🎭', text: 'コスプレ・変身ギャップ', type: 'C' },
        { emoji: '🦋', text: '人外・非日常の魅力', type: 'D' },
      ]},
      { question: 'プレイ内容で近いのは？', options: [
        { emoji: '💕', text: '甘々いちゃラブ', type: 'A' },
        { emoji: '🖤', text: '焦らしと駆け引き', type: 'F' },
        { emoji: '🙌', text: 'ご奉仕たっぷり', type: 'C' },
        { emoji: '⛓', text: 'ハードめで刺激重視', type: 'F' },
      ]},
      { question: '世界観で選ぶなら？', options: [
        { emoji: '🏠', text: '日常・恋人感のある世界', type: 'A' },
        { emoji: '🏢', text: '大人の現実感がある関係', type: 'B' },
        { emoji: '🎪', text: '衣装やシチュ映えする世界', type: 'C' },
        { emoji: '🌌', text: '異世界・ファンタジー世界', type: 'D' },
      ]},
    ];

    const resultData = {
      A: { title: '甘々いちゃラブ系', description: '恋人感、一途さ、安心して読める幸福感が刺さるタイプ。', tags: ['ラブラブ', '同棲', '純愛', 'いちゃいちゃ'] },
      B: { title: '大人の余裕・年上系', description: '落ち着いた空気感や、包容力のあるヒロインに惹かれやすいタイプ。', tags: ['お姉さん', 'OL', '女上司', '大人の恋'] },
      C: { title: 'コスチューム・シチュ系', description: '衣装、シチュエーション、見た目の強さを楽しみたいタイプ。', tags: ['メイド', 'ナース', 'コスプレ', 'ご奉仕'] },
      D: { title: 'ファンタジー・人外系', description: '現実離れした設定や種族要素、異世界感に魅力を感じるタイプ。', tags: ['エルフ', 'サキュバス', '異世界', '人外'] },
      E: { title: 'ラブコメ・ハイテンション系', description: '明るさ、笑いやすさ、テンポの良さを重視するタイプ。', tags: ['ラブコメ', 'ギャル', '賑やか', 'コメディ'] },
      F: { title: '小悪魔・駆け引き系', description: '挑発的なやりとりや、主導権の揺れが楽しいタイプ。', tags: ['小悪魔', '翻弄', '駆け引き', '刺激強め'] }
    };

    let currentPage = 'home';
    let selectedManga = null;
    let diagStep = -1;
    let diagAnswers = [];
    let showResult = false;
    let resultType = null;
    let currentListPage = 1;
    const ITEMS_PER_PAGE = 12;

    // LocalStorageから読み込み
    function loadData() {
      try {
        const site = localStorage.getItem(STORAGE_KEYS.siteSettings);
        if (site) siteSettings = JSON.parse(site);
        const manga = localStorage.getItem(STORAGE_KEYS.mangaList);
        if (manga) mangaList = JSON.parse(manga);
        const tags = localStorage.getItem(STORAGE_KEYS.tags);
        if (tags) tagsMaster = JSON.parse(tags);
        const badges = localStorage.getItem(STORAGE_KEYS.badges);
        if (badges) badgesMaster = JSON.parse(badges);
        const folders = localStorage.getItem(STORAGE_KEYS.imageFolders);
        if (folders) imageFolders = JSON.parse(folders);
      } catch (e) { console.error('Load error:', e); }
    }

    function calculateResult() {
      const counts = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
      diagAnswers.forEach(t => counts[t]++);
      let max = 0, types = [];
      for (const t in counts) {
        if (counts[t] > max) { max = counts[t]; types = [t]; }
        else if (counts[t] === max && counts[t] > 0) types.push(t);
      }
      return types.length > 1 && types.includes(diagAnswers[0]) ? diagAnswers[0] : types[0];
    }

    function render() {
      const app = document.getElementById('app');
      if (currentPage === 'detail' && selectedManga) {
        app.innerHTML = renderDetail();
      } else {
        app.innerHTML = renderHome();
      }
    }

    function renderHome() {
      return `
        <header class="header">
          <div class="logo">
            <div class="logo-icon">M</div>
            <span class="logo-text">${siteSettings.siteName}</span>
          </div>
          <div class="search-box">
            <span style="opacity:0.5">🔍</span>
            <input type="text" class="search-input" placeholder="検索">
          </div>
        </header>
        
        <section class="hero">
          <div class="badge">${siteSettings.badge}</div>
          <h1>${siteSettings.mainTitle.replace('試し読み', '<span>試し読み</span>')}</h1>
          <p>人気作品の冒頭を無料公開中</p>
        </section>
        
        <section class="diagnosis">
          <div class="diagnosis-box">
            <div class="diagnosis-header">
              <div class="diagnosis-icon">🤖</div>
              <span class="diagnosis-title">おすすめ診断</span>
              <span class="diagnosis-step ${showResult ? 'complete' : ''}">${showResult ? '完了!' : diagStep >= 0 ? 'Q' + (diagStep + 1) + '/5' : ''}</span>
            </div>
            ${showResult ? renderResult() : diagStep >= 0 ? renderQuestion() : renderStart()}
          </div>
        </section>
        
        <section class="section">
          <h2 class="section-title">📖 人気作品</h2>
          <div class="manga-grid">
            ${(() => {
              const totalPages = Math.ceil(mangaList.length / ITEMS_PER_PAGE);
              const startIdx = (currentListPage - 1) * ITEMS_PER_PAGE;
              const endIdx = startIdx + ITEMS_PER_PAGE;
              const pageItems = mangaList.slice(startIdx, endIdx);
              
              return pageItems.map((m, i) => {
                const thumb = getMangaThumbnail(m);
                return `
                <div class="manga-card" onclick="openManga(${m.id})">
                  <div class="manga-thumb">
                    ${thumb ? `<img src="${thumb}">` : '<span class="manga-thumb-placeholder">サムネイル</span>'}
                    ${m.badge ? `<span class="manga-badge">${m.badge}</span>` : ''}
                  </div>
                  <div class="manga-info">
                    <div class="manga-title">${m.title}</div>
                    <div class="manga-meta">
                      <span class="manga-genre">${m.genre}</span>
                      <span class="manga-rating">★ ${m.rating}</span>
                    </div>
                  </div>
                </div>
                ${(i + 1) % 6 === 0 && i < pageItems.length - 1 ? '<div class="ad-slot"><span class="ad-label">広告枠</span><div class="ad-placeholder"></div></div>' : ''}
              `}).join('');
            })()}
          </div>
          ${renderPagination()}
        </section>
        
        <footer class="footer">
          <p>© 2026 ${siteSettings.siteName}</p>
        </footer>`;
    }

    function renderPagination() {
      const totalPages = Math.ceil(mangaList.length / ITEMS_PER_PAGE);
      if (totalPages <= 1) return '';
      
      let pages = [];
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentListPage - 1 && i <= currentListPage + 1)) {
          pages.push(i);
        } else if (pages[pages.length - 1] !== '...') {
          pages.push('...');
        }
      }
      
      return `
        <div class="pagination">
          <div class="pagination-nav">
            <button class="pagination-arrow ${currentListPage === 1 ? 'disabled' : ''}" onclick="goToPage(${currentListPage - 1})" ${currentListPage === 1 ? 'disabled' : ''}>←</button>
            <div class="pagination-pages">
              ${pages.map(p => p === '...' ? 
                '<span class="pagination-dots">...</span>' : 
                `<button class="pagination-num ${p === currentListPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`
              ).join('')}
            </div>
            <button class="pagination-arrow ${currentListPage === totalPages ? 'disabled' : ''}" onclick="goToPage(${currentListPage + 1})" ${currentListPage === totalPages ? 'disabled' : ''}>→</button>
          </div>
          <div class="pagination-info">${currentListPage} / ${totalPages} ページ</div>
        </div>`;
    }

    function goToPage(page) {
      const totalPages = Math.ceil(mangaList.length / ITEMS_PER_PAGE);
      if (page < 1 || page > totalPages) return;
      currentListPage = page;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderStart() {
      return `
        <div style="text-align:center;padding:10px 0">
          <p style="font-size:12px;opacity:0.7;margin-bottom:12px">5つの質問であなたにピッタリの作品を診断！</p>
          <button class="btn-start" onclick="startDiag()">🔍 診断してみる</button>
        </div>`;
    }

    function renderQuestion() {
      const q = diagnosisQuestions[diagStep];
      return `
        <div class="diagnosis-question">${q.question}</div>
        <div class="diagnosis-options">
          ${q.options.map(o => `
            <button class="diagnosis-option" onclick="answer('${o.type}')">
              <span class="diagnosis-option-emoji">${o.emoji}</span>
              <span class="diagnosis-option-text">${o.text}</span>
            </button>
          `).join('')}
        </div>`;
    }

    function renderResult() {
      const r = resultData[resultType];
      const rec = mangaList.filter(m => m.type === resultType).slice(0, 2);
      return `
        <div class="diagnosis-result">
          <div class="diagnosis-result-type">✨ ${r.title}</div>
          <div class="diagnosis-result-desc">${r.description}</div>
          <div class="diagnosis-result-tags">${r.tags.map(t => `<span class="diagnosis-result-tag">#${t}</span>`).join('')}</div>
        </div>
        <p style="font-size:11px;opacity:0.6;margin-bottom:8px;text-align:center">🎯 あなたへのおすすめ</p>
        <div class="diagnosis-recommend">
          ${rec.map(m => `
            <div class="diagnosis-recommend-item" onclick="openManga(${m.id})">
              <div class="diagnosis-recommend-thumb">
                ${getMangaThumbnail(m) ? `<img src="${getMangaThumbnail(m)}">` : '<span class="diagnosis-recommend-placeholder">サムネ</span>'}
              </div>
              <div class="diagnosis-recommend-title">${m.title}</div>
            </div>
          `).join('')}
        </div>
        <button class="btn-reset" onclick="resetDiag()">🔄 もう一回診断する</button>`;
    }

    function renderDetail() {
      const m = selectedManga;
      // ランダムでおすすめ作品を選択（自分以外）
      const otherManga = mangaList.filter(x => x.id !== m.id);
      const shuffled = otherManga.sort(() => Math.random() - 0.5);
      const recommended = shuffled.slice(0, 3);
      
      const thumb = getMangaThumbnail(m);
      // フォルダの全画像をページとして使用
      const allImages = m.imageFolder && imageFolders[m.imageFolder] ? imageFolders[m.imageFolder] : [];
      const totalPages = allImages.length > 0 ? allImages.length : m.pages;
      
      return `
        <header class="detail-header">
          <button class="back-btn" onclick="goHome()">←</button>
          <span class="detail-title">${m.title}</span>
        </header>
        
        <section class="manga-detail">
          <div class="manga-detail-inner">
            <div class="manga-cover">
              ${thumb ? `<img src="${thumb}">` : '<span class="manga-cover-placeholder">表紙</span>'}
            </div>
            <div class="manga-detail-info">
              <div class="manga-detail-badges">
                ${m.badge ? `<span class="manga-detail-badge">${m.badge}</span>` : ''}
                <span class="manga-detail-rating">★ ${m.rating}</span>
              </div>
              <h1 class="manga-detail-title">${m.title}</h1>
              <p class="manga-detail-genre">${m.genre}</p>
              <p class="manga-detail-desc">${m.description}</p>
            </div>
          </div>
        </section>
        
        <section class="reader">
          <div class="reader-pages">
            ${allImages.length > 0 ? 
              allImages.map((img, i) => `
                <div class="reader-page">
                  <img src="${img.dataUrl}">
                  <span class="reader-page-num">${i + 1}/${totalPages}</span>
                </div>
              `).join('') :
              Array.from({length: totalPages}, (_, i) => `
                <div class="reader-page">
                  <span class="reader-page-placeholder">${i + 1}ページ目</span>
                  <span class="reader-page-num">${i + 1}/${totalPages}</span>
                </div>
              `).join('')
            }
          </div>
        </section>
        
        <section class="rating-section" style="padding:16px;border-bottom:1px solid #222">
          <p style="font-size:12px;text-align:center;margin-bottom:12px">この作品はいかがでしたか？</p>
          <div style="display:flex;justify-content:center;gap:24px">
            <button onclick="rateManga(${m.id}, 'like')" style="background:#22c55e;border:none;color:#fff;padding:12px 28px;border-radius:24px;cursor:pointer;font-size:16px;display:flex;align-items:center;gap:8px">
              👍 <span style="font-size:13px">${m.likes || 0}</span>
            </button>
            <button onclick="rateManga(${m.id}, 'dislike')" style="background:#ef4444;border:none;color:#fff;padding:12px 28px;border-radius:24px;cursor:pointer;font-size:16px;display:flex;align-items:center;gap:8px">
              👎 <span style="font-size:13px">${m.dislikes || 0}</span>
            </button>
          </div>
        </section>
        
        <section class="cta">
          <div class="cta-box">
            <p class="cta-title">続きが気になる？</p>
            <p class="cta-subtitle">全話読むならこちらから！</p>
            <a href="#" class="cta-btn">📚 続きを読む</a>
            <p class="cta-note">※ 外部サイトに移動します</p>
          </div>
        </section>
        
        <section class="related">
          <h2 class="related-title">✨ オススメの作品</h2>
          <div class="related-list">
            ${recommended.map(r => {
              const rThumb = getMangaThumbnail(r);
              return `
              <div class="related-item" onclick="openManga(${r.id})">
                <div class="related-thumb">
                  ${rThumb ? `<img src="${rThumb}">` : '<span class="related-thumb-placeholder">サムネ</span>'}
                </div>
                <p class="related-name">${r.title}</p>
                <p class="related-rating">★ ${r.rating}</p>
              </div>
            `}).join('')}
          </div>
        </section>
        
        <footer class="footer">
          <p>© 2026 ${siteSettings.siteName}</p>
        </footer>`;
    }
    
    // いいね/わるい機能
    function rateManga(id, type) {
      const manga = mangaList.find(m => m.id === id);
      if (!manga) return;
      
      // 既に投票済みかチェック
      const voted = localStorage.getItem('voted_' + id);
      if (voted) {
        alert('既に評価済みです');
        return;
      }
      
      if (type === 'like') {
        manga.likes = (manga.likes || 0) + 1;
      } else {
        manga.dislikes = (manga.dislikes || 0) + 1;
      }
      
      localStorage.setItem('mangahub_manga', JSON.stringify(mangaList));
      localStorage.setItem('voted_' + id, type);
      selectedManga = manga;
      render();
    }

    // Actions
    function startDiag() { diagStep = 0; render(); }
    function answer(t) {
      diagAnswers.push(t);
      if (diagStep < 4) diagStep++;
      else { resultType = calculateResult(); showResult = true; }
      render();
    }
    function resetDiag() { diagStep = -1; diagAnswers = []; showResult = false; resultType = null; render(); }
    
    function openManga(id) {
      selectedManga = mangaList.find(m => m.id === id);
      currentPage = 'detail';
      // URLを更新
      const url = new URL(window.location);
      url.searchParams.set('id', id);
      window.history.pushState({id: id}, '', url);
      window.scrollTo(0, 0);
      render();
    }
    
    function goHome() {
      currentPage = 'home';
      selectedManga = null;
      currentListPage = 1;
      // URLからパラメータを削除
      const url = new URL(window.location);
      url.searchParams.delete('id');
      window.history.pushState({}, '', url);
      render();
    }
    
    // ブラウザの戻る/進むボタン対応
    window.addEventListener('popstate', function(e) {
      const url = new URL(window.location);
      const id = url.searchParams.get('id');
      if (id) {
        const manga = mangaList.find(m => m.id === parseInt(id));
        if (manga) {
          selectedManga = manga;
          currentPage = 'detail';
        } else {
          currentPage = 'home';
          selectedManga = null;
        }
      } else {
        currentPage = 'home';
        selectedManga = null;
      }
      render();
    });
    
    // URLパラメータから初期表示を決定
    function initFromUrl() {
      const url = new URL(window.location);
      const id = url.searchParams.get('id');
      if (id) {
        const manga = mangaList.find(m => m.id === parseInt(id));
        if (manga) {
          selectedManga = manga;
          currentPage = 'detail';
        }
      }
    }

    // 初期化
    loadData();
    initFromUrl();
    render();
  </script>
</body>
</html>
